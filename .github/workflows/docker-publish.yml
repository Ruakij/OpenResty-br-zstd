name: docker-publish

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
    paths:
      - "Dockerfile"
      - "container/**"
      - "versions.json"
      - ".github/workflows/docker-publish.yml"
  pull_request:
    paths:
      - "Dockerfile"
      - "container/**"
      - "versions.json"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      openresty: ${{ steps.config.outputs.openresty }}
      variants: ${{ steps.config.outputs.variants }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Read configured OpenResty tags
        id: config
        run: |
          set -euo pipefail

          openresty="$(jq -r '.openresty' versions.json)"
          variants="$(jq -c '.variants // ["alpine-fat"]' versions.json)"

          if [ -z "${openresty}" ] || [ "${openresty}" = "null" ]; then
            echo "versions.json .openresty must be set."
            exit 1
          fi

          if [ "${variants}" = "null" ] || [ "${variants}" = "[]" ]; then
            echo "versions.json .variants must contain at least one entry."
            exit 1
          fi

          echo "openresty=${openresty}" >> "$GITHUB_OUTPUT"
          echo "variants=${variants}" >> "$GITHUB_OUTPUT"

  build:
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        variant: ${{ fromJson(needs.prepare.outputs.variants) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ needs.prepare.outputs.openresty }}-${{ matrix.variant }}
            type=raw,value=${{ matrix.variant }},enable=${{ github.ref_name == github.event.repository.default_branch }}
            type=raw,value=latest,enable=${{ github.ref_name == github.event.repository.default_branch && matrix.variant == 'alpine-fat' }}

      - name: Build and optionally push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          build-args: |
            OPENRESTY_BASE_TAG=${{ needs.prepare.outputs.openresty }}
            OPENRESTY_VARIANT=${{ matrix.variant }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
