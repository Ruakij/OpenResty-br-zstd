# Gzip - compatibility
gzip off;
gzip_vary on;
gzip_static on;
gzip_comp_level 1;
gzip_min_length 10240;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/json
    application/xml
    application/xml+rss
    application/atom+xml
    image/svg+xml
    application/vnd.ms-fontobject
    font/ttf
    font/otf
    application/wasm
    image/svg+xml;

# Brotli - modern
brotli off;
brotli_static on;
brotli_comp_level 1;
brotli_min_length 65536;    # Brotli is very expensive
brotli_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/json
    application/xml
    application/xml+rss
    application/atom+xml
    image/svg+xml
    application/vnd.ms-fontobject
    font/ttf
    font/otf
    application/wasm
    image/svg+xml;

# Zstandard - latest
zstd off;
zstd_static on;
zstd_comp_level 3;
zstd_min_length 10240;
zstd_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/json
    application/xml
    application/xml+rss
    application/atom+xml
    image/svg+xml
    application/vnd.ms-fontobject
    font/ttf
    font/otf
    application/wasm
    image/svg+xml;
